<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خطة السفر الذكية - AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; border-radius: 20px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
        h1 { color: #667eea; text-align: center; margin-bottom: 10px; }
        .subtitle { text-align: center; color: #666; margin-bottom: 30px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #333; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #667eea; color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        button:hover { background: #5568d3; }
        .result, .ai-box { margin-top: 30px; padding: 20px; background: #f0f4ff; border-radius: 10px; }
        .ai-box { background: #fff3e0; border: 2px solid #ff9800; }
        .result { display: none; }
        .ai-response { margin-top: 15px; white-space: pre-wrap; line-height: 1.8; }
        .loading { display: none; text-align: center; color: #ff9800; }
    </style>
</head>
<body>
    <div class="container">
        <h1>✈️ خطة السفر الذكية - AI</h1>
        <p class="subtitle">مشروع تطبيقات الذكاء الاصطناعي - مستشار سفر ذكي</p>
        
        <div class="form-group">
            <label>اختر الدولة:</label>
            <select id="country">
                <option value="الإمارات">الإمارات 🇦🇪</option>
                <option value="تركيا">تركيا 🇹🇷</option>
                <option value="بريطانيا">بريطانيا 🇬🇧</option>
                <option value="تايلاند">تايلاند 🇹🇭</option>
                <option value="ماليزيا">ماليزيا 🇲🇾</option>
            </select>
        </div>

        <div class="form-group">
            <label>عدد الأيام:</label>
            <input type="number" id="days" value="7" min="1">
        </div>

        <div class="form-group">
            <label>ميزانيتك الإجمالية (ريال):</label>
            <input type="number" id="budget" value="5000" min="0">
        </div>

        <button onclick="calculate()">1. احسب الميزانية</button>
        <button onclick="askAI()" style="background: #ff9800;">2. اسأل المستشار الذكي 🤖</button>

        <div class="result" id="result">
            <h3>📊 تفاصيل الميزانية</h3>
            <div id="resDetails"></div>
        </div>

        <div class="ai-box">
            <h3>🤖 مستشار السفر بالذكاء الاصطناعي</h3>
            <p style="font-size:14px; color:#666; margin:10px 0;">اكتب سؤالك: مثال "وش أفضل الأماكن في تركيا بـ 5000 ريال؟"</p>
            <textarea id="aiQuestion" rows="3" placeholder="اسأل الذكاء الاصطناعي عن رحلتك..."></textarea>
            <div class="loading" id="loading">جاري التفكير... 🤔</div>
            <div class="ai-response" id="aiResponse"></div>
        </div>
    </div>

    <script>
        function calculate() {
            const country = document.getElementById('country').value;
            const days = parseInt(document.getElementById('days').value);
            const budget = parseInt(document.getElementById('budget').value);
            const perDay = Math.floor(budget / days);
            
            document.getElementById('resDetails').innerHTML = `
                <p><strong>الدولة:</strong> ${country}</p>
                <p><strong>الميزانية اليومية المتاحة:</strong> ${perDay} ريال</p>
                <p><strong>الإجمالي:</strong> ${budget} ريال لـ ${days} أيام</p>
            `;
            document.getElementById('result').style.display = 'block';
        }

        async function askAI() {
            const question = document.getElementById('aiQuestion').value;
            const country = document.getElementById('country').value;
            const days = document.getElementById('days').value;
            const budget = document.getElementById('budget').value;
            
            if(!question) {
                alert('اكتب سؤالك أول');
                return;
            }

            document.getElementById('loading').style.display = 'block';
            document.getElementById('aiResponse').textContent = '';

            // هنا تربط مع API حقيقي. هذا مثال وهمي للعرض
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('aiResponse').textContent = 
                `بناءً على ميزانيتك ${budget} ريال لـ ${days} أيام في ${country}:\n\n` +
                `1. أنصحك بالسكن في مناطق متوسطة السعر لتوفير 30% من الميزانية.\n` +
                `2. أفضل وقت للزيارة هو خارج المواسم السياحية.\n` +
                `3. خصص 20% من ميزانيتك للطوارئ والتسوق.\n\n` +
                `*ملاحظة: هذه نسخة تجريبية. للربط مع ChatGPT حقيقي تحتاج API Key مجاني من OpenAI*`;
            }, 2000);
        }
    </script>
</body>
</html>
